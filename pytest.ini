[pytest]
filterwarnings =
    # 알려진 서드파티 경고: TestClient가 내부적으로 httpx를 쓰는 것에 대한
    # starlette의 deprecation 경고 (StarletteDeprecationWarning은 UserWarning의
    # 서브클래스라 DeprecationWarning이 아니다). httpx2 마이그레이션은 별도 트랙.
    ignore:Using `httpx` with `starlette.testclient` is deprecated.*:starlette.exceptions.StarletteDeprecationWarning
