app = "plan-lint-web"
primary_region = "nrt"

[build]

[env]
  PLW_QUOTA_DB = "/data/quota.sqlite3"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[mounts]
  source = "plan_lint_data"
  destination = "/data"
